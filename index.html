<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rafael Honda</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- Icons -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <header class="topo">
    <div class="banner"></div>

    <div class="perfil-area">
      <img src="img/rafael-perfil.png" class="perfil">

      <div class="logo-loja">
        <img src="img/Honda_Logo.svg 1.svg">
      </div>
    </div>

    <div class="info">
      <h1>
        Rafael Honda
        <i class="fa-solid fa-circle-check"></i>
      </h1>

      <p>
        Conectando você à sua próxima moto
        com as melhores condições!
      </p>

      <div class="botoes">
        <a href="#" class="btn whatsapp">
          <i class="fa-brands fa-whatsapp"></i>
          Whatsapp
        </a>

        <a href="#" class="btn instagram">
          <i class="fa-brands fa-instagram"></i>
          Instagram
        </a>
      </div>
    </div>
  </header>

  <section class="motos">

    <h2>Escolha sua moto</h2>

    <div class="card-moto">

      <h3>POP 110i ES</h3>
      

      <img src="img/257529-6 1.svg">

      <button>Detalhes da moto</button>
      <button class="secundario">Planos de consórcio</button>
      <button class="secundario">Financiamento</button>

    </div>

  </section>

  <script src="js/script.js"></script>

</body>
</html>
